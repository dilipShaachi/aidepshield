name: AIDepShield
description: Ship code, not malware. Real-time AI supply chain IOC scanning.
author: dilipShaachi

branding:
  icon: shield
  color: red

inputs:
  requirements_file:
    description: Path to requirements.txt file
    required: false
    default: requirements.txt
  fail_on_severity:
    description: Fail build if severity >= this level (critical, high, medium, low)
    required: false
    default: high
  api_url:
    description: AIDepShield API endpoint
    required: false
    default: https://aidepshield-production.up.railway.app

runs:
  using: composite
  steps:
    - name: Run AIDepShield scan
      shell: bash
      run: |
        set -euo pipefail

        echo "AIDepShield - Ship code, not malware."
        echo "--------------------------------------------------"

        REQ_FILE="${{ inputs.requirements_file }}"
        API_URL="${{ inputs.api_url }}"

        if [ ! -f "$REQ_FILE" ]; then
          echo "WARNING: No requirements file found at $REQ_FILE - skipping scan."
          exit 0
        fi

        echo "Scanning $REQ_FILE ..."
        echo ""

        # Build JSON payload safely
        REQUIREMENTS=$(cat "$REQ_FILE")
        PAYLOAD=$(python3 -c "import json, sys; print(json.dumps({'requirements': sys.stdin.read()}))" <<< "$REQUIREMENTS")

        # Call the API
        HTTP_CODE=$(curl -s -o /tmp/aidep_response.json -w "%{http_code}" \
          -X POST "$API_URL/scan" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        if [ "$HTTP_CODE" != "200" ]; then
          echo "ERROR: AIDepShield API returned HTTP $HTTP_CODE"
          cat /tmp/aidep_response.json || true
          exit 1
        fi

        # Parse and display results
        python3 << 'PYEOF'
        import json, sys

        with open("/tmp/aidep_response.json") as f:
            data = json.load(f)

        results = data.get("results", [])
        compromised = []

        for r in results:
            status = r["status"]
            icon = "PASS" if status == "SAFE" else ("FAIL" if status == "COMPROMISED" else "WARN")
            ver = r.get("version") or "unknown"
            print(f"  [{icon}]  {r['package']:<25} {ver:<15} {status}")
            if status == "COMPROMISED":
                compromised.append(r)
                if r.get("ioc"):
                    print(f"         IOC: {r['ioc']}")
                if r.get("report_url"):
                    print(f"         Report: {r['report_url']}")

        print("")
        print("--------------------------------------------------")
        print(data.get("summary", ""))

        if compromised:
            print("")
            print("Build blocked. Remove or update the compromised package(s).")
            sys.exit(1)
        PYEOF
