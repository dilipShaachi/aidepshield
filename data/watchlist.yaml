# AIDepShield V2 — Monitored Package Watchlist
# Add packages here to monitor for suspicious new releases
# All packages are checked against PyPI for new versions

packages:
  - litellm
  - openai
  - anthropic
  - langchain
  - langchain-core
  - langchain-community
  - transformers
  - torch
  - diffusers
  - sentence-transformers
  - llama-index
  - crewai
  - autogen
  - vllm
  - fastapi
  - pydantic
  - uvicorn
  - httpx
  - tiktoken
  - tokenizers

# Poll interval in seconds (default: 300 = 5 minutes)
poll_interval: 300
