name: AIDepShield — Supply Chain Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scan:
    name: Scan AI dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan with AIDepShield
        uses: dilipShaachi/aidepshield@v1
        with:
          requirements_file: requirements.txt
          fail_on_severity: high
          api_url: https://aidepshield-production.up.railway.app
